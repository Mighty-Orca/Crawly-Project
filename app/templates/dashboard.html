<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawlyy - Crawler Berita</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        nav {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .brand {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }
        nav .user-info {
            color: #aaa;
            font-size: 0.875rem;
        }
        nav .user-info a {
            color: #f87171;
            text-decoration: none;
            margin-left: 1rem;
            font-weight: 600;
        }
        nav .user-info a:hover { text-decoration: underline; }

        /* ── Layout ── */
        .page {
            max-width: 860px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 1.8rem;
            margin-bottom: 1.5rem;
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 2px solid #f0f2f5;
        }

        /* ── Form elements ── */
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 0.6rem 0.85rem;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #4f46e5; }

        /* ── Portal checkboxes ── */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.75rem;
        }

        .portal-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8f9ff;
            border: 1.5px solid #e0e0f0;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .portal-item:hover { border-color: #4f46e5; background: #eef0ff; }
        .portal-item input[type="checkbox"] { accent-color: #4f46e5; width: 16px; height: 16px; }
        .portal-item span { font-size: 0.875rem; font-weight: 500; color: #333; }

        /* ── Tanggal row ── */
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* ── Tombol ── */
        .btn-crawl {
            width: 100%;
            padding: 0.85rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .btn-crawl:hover { background: #4338ca; }

        /* ── Flash messages ── */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        .alert.error { background: #fee2e2; color: #b91c1c; }
        .alert.success { background: #dcfce7; color: #15803d; }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #ffffff40;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: white;
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="brand">Crawlyy</div>
        <div class="user-info">
            <strong style="color:white;">{{ username }}</strong>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="page">

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <!-- Form Crawling -->
        <form method="POST" action="/crawl">

            <!-- Keyword -->
            <div class="card">
                <h2>Kata Kunci</h2>
                <label for="keyword">Masukkan kata kunci berita</label>
                <input type="text" id="keyword" name="keyword"
                       placeholder="contoh: pemilu, banjir, ekonomi..." required>
            </div>

            <!-- Pilih Portal -->
            <div class="card">
                <h2>📰 Pilih Portal Berita</h2>
                <div class="portal-grid">
                   <label class="portal-item">
                        <input type="checkbox" name="portals" value="detik">
                        <span>Detik.com</span>
                    </label>
                    <label class="portal-item">
                        <input type="checkbox" name="portals" value="kompas">
                        <span>Kompas.com</span>
                    </label>
                    <label class="portal-item">
                        <input type="checkbox" name="portals" value="republika">
                        <span>Republika.co.id</span>
                    </label>
                    <label class="portal-item">
                        <input type="checkbox" name="portals" value="beritasatu">
                        <span>BeritaSatu.com</span>
                    </label>
                    <label class="portal-item">
                        <input type="checkbox" name="portals" value="rri">
                        <span>RRI.co.id</span>
                    </label>
                </div>
            </div>

            <!-- Filter Tanggal -->
            <div class="card">
                <h2>📅 Filter Tanggal</h2>
                <div class="date-row">
                    <div>
                        <label for="date_from">Dari tanggal</label>
                        <input type="date" id="date_from" name="date_from">
                    </div>
                    <div>
                        <label for="date_to">Sampai tanggal</label>
                        <input type="date" id="date_to" name="date_to">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-crawl">Mulai Crawling</button>

        </form>
    </div>

    <<!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="loading-text">⏳ Sedang crawling, mohon tunggu...</p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            document.getElementById('loadingOverlay').classList.add('active');
        });
    </script>

</body>
</html>
